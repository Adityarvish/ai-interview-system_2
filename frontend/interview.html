<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview in Progress - AI Voice Interview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#F9F9F9] font-['IBM_Plex_Sans',_sans-serif] overflow-hidden">

    <div class="h-screen w-screen flex flex-col">
        <!-- Top Bar -->
        <div class="flex justify-between items-center w-full px-8 py-6 bg-white/70 backdrop-blur-xl border-b border-[#E5E5E5] z-10">
            <div class="flex items-center gap-3">
                <i class="ph ph-timer text-xl text-[#525252]"></i>
                <span id="timer" data-testid="interview-timer" class="font-['JetBrains_Mono',_monospace] text-4xl tracking-tighter text-[#0A0A0A]">00:00</span>
            </div>
            <div class="text-right">
                <p class="text-xs uppercase tracking-[0.2em] font-semibold text-[#A3A3A3]">Progress</p>
                <p id="progress" data-testid="progress-indicator" class="text-sm text-[#0A0A0A] font-medium">Question 1</p>
            </div>
        </div>

        <!-- Central Interview Area -->
        <div class="flex-1 flex flex-col md:flex-row relative overflow-hidden">
            <div class="flex-1 flex flex-col items-center justify-center relative p-8 overflow-hidden">
                <!-- Status Indicator -->
                <div class="mb-6 text-center">
                    <p id="statusText" data-testid="status-text" class="text-lg font-medium text-[#525252]">Connecting...</p>
                </div>

                <!-- Waveform Visualizer -->
                <div id="waveformContainer" class="relative">
                    <canvas
                        id="waveform"
                        width="384"
                        height="384"
                        class="w-64 h-64 md:w-80 md:h-80 transition-shadow duration-500"
                    ></canvas>
                </div>

                <!-- Current Question Display -->
                <div class="mt-6 max-w-2xl text-center px-4">
                    <p id="currentQuestion" data-testid="current-question" class="text-lg md:text-xl text-[#0A0A0A] font-medium leading-relaxed"></p>
                </div>

                <!-- Action Hint -->
                <div class="mt-6 text-center">
                    <p id="actionHint" class="text-sm text-[#A3A3A3]">Please wait while the AI prepares your interview...</p>
                </div>

                <!-- Bottom Controls -->
                <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-wrap gap-3 items-center justify-center bg-white/95 backdrop-blur-xl px-5 py-3 rounded-full border border-[#E5E5E5] shadow-lg max-w-[95vw]">
                    <!-- Done Speaking - primary action -->
                    <button
                        id="doneButton"
                        data-testid="done-speaking-button"
                        disabled
                        class="bg-[#0A0A0A] text-white px-6 py-3 rounded-full font-medium hover:bg-[#262626] disabled:opacity-40 disabled:cursor-not-allowed transition-all flex items-center gap-2"
                    >
                        <i class="ph ph-check-circle text-xl"></i>
                        <span>I'm Done Speaking</span>
                    </button>

                    <!-- Mute Toggle -->
                    <button
                        id="muteButton"
                        data-testid="mic-mute-toggle"
                        class="w-11 h-11 rounded-full flex items-center justify-center hover:bg-neutral-100 transition-colors border border-[#E5E5E5]"
                        title="Mute/Unmute"
                    >
                        <i class="ph ph-microphone text-xl text-[#0A0A0A]"></i>
                    </button>

                    <!-- Transcript Toggle (mobile only) -->
                    <button
                        id="transcriptToggle"
                        data-testid="transcript-toggle"
                        class="w-11 h-11 rounded-full flex items-center justify-center hover:bg-neutral-100 transition-colors border border-[#E5E5E5] md:hidden"
                        title="Toggle Transcript"
                    >
                        <i class="ph ph-article text-xl text-[#0A0A0A]"></i>
                    </button>

                    <!-- End Interview -->
                    <button
                        id="cancelButton"
                        data-testid="cancel-interview-button"
                        class="text-[#FF3B30] border border-[#FF3B30] px-5 py-2 rounded-full hover:bg-[#FF3B30]/10 transition-colors font-medium text-sm"
                    >
                        End Interview
                    </button>
                </div>
            </div>

            <!-- Transcript Panel (Desktop) -->
            <div id="transcriptPanel" class="hidden md:block w-80 h-full border-l border-[#E5E5E5] bg-[#F9F9F9] overflow-y-auto">
                <div class="p-6">
                    <h3 class="text-xs uppercase tracking-[0.2em] font-semibold text-[#A3A3A3] mb-4">Live Transcript</h3>
                    <div id="transcriptContent" data-testid="transcript-content" class="space-y-3"></div>
                </div>
            </div>

            <!-- Transcript Panel (Mobile Overlay) -->
            <div id="transcriptOverlay" class="md:hidden fixed inset-0 bg-white z-50 overflow-y-auto hidden">
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-medium text-[#0A0A0A]">Transcript</h3>
                        <button id="closeTranscript" class="w-8 h-8 flex items-center justify-center">
                            <i class="ph ph-x text-2xl"></i>
                        </button>
                    </div>
                    <div id="transcriptContentMobile" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    
    <!-- Audio Unlock Banner — shown until first user interaction -->
    <div id="audioUnlockBanner"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[9999] cursor-pointer">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm mx-4 text-center">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="ph ph-speaker-high text-3xl text-blue-600"></i>
            </div>
            <h2 class="text-xl font-semibold text-gray-900 mb-2">Enable AI Voice</h2>
            <p class="text-sm text-gray-500 mb-6">
                Tap anywhere to enable audio so you can hear the AI interviewer speaking.
            </p>
            <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 transition-colors">
                Tap to Enable Audio &amp; Start
            </button>
        </div>
    </div>

    <!-- Audio element for AI playback (kept in DOM, invisible but active) -->
    <audio id="aiAudioPlayer" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;" preload="auto"></audio>

    <!-- Flask-SocketIO serves this automatically -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
      // CDN fallback if local Socket.IO script failed to load
      if (typeof io === 'undefined') {
        document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"><\/script>');
      }
    </script>
    <script src="js/interview.js"></script>
</body>
</html>
